name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Create dummy .env
        run: cp .env.example .env

      - name: Run tests
        run: pytest tests/ -v

      - name: Verify imports
        run: |
          python -c "
          from tools import TOOL_DEFINITIONS, TOOLS_REGISTRY, execute_tool
          from agent import AgentSession, run
          from model_router import get_router
          from config import config
          from mcp.protocol import parse_message, format_message
          from mcp.server import MCPServer
          from mcp.client import MCPClientManager
          from rag.indexer import _get_chunk_lines
          from rag.retriever import semantic_search
          assert len(TOOL_DEFINITIONS) == 15, f'Expected 15 tools, got {len(TOOL_DEFINITIONS)}'
          assert len(TOOLS_REGISTRY) == 15
          print(f'All imports OK, {len(TOOL_DEFINITIONS)} tools registered')
          "
